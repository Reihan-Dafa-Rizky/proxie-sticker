<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login - Proxie Stickers</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0b1329] min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <div class="bg-[#131c35] w-full max-w-md rounded-2xl shadow-[0_0_50px_rgba(245,158,11,0.15)] border border-slate-800 p-8 relative overflow-hidden transition-all duration-500">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-wider drop-shadow-md">PROXIE <span class="text-amber-500">STICKERS</span></h1>
            <p id="formSubtitle" class="text-slate-400 text-sm mt-2 transition-all duration-300">Sign in or Register</p>
        </div>

        <div class="relative w-full min-h-[340px]">
            
            <form id="loginForm" class="space-y-5 absolute w-full top-0 left-0 transition-all duration-500 transform translate-x-0 opacity-100 pointer-events-auto">
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Username</label>
                    <input type="text" id="loginUser" placeholder="Masukkan username" required
                        class="w-full bg-[#1e294b] text-white placeholder-slate-500 text-sm rounded-xl px-4 py-3 border border-slate-700 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition-all">
                </div>

                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="loginPass" placeholder="Masukkan password" required
                        class="w-full bg-[#1e294b] text-white placeholder-slate-500 text-sm rounded-xl px-4 py-3 border border-slate-700 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 transition-all">
                </div>

                <div id="loginError" class="text-red-400 text-xs font-medium hidden animate-pulse">
                    ⚠️ Username atau password salah / belum terdaftar!
                </div>

                <button type="submit" 
                    class="w-full bg-amber-500 hover:bg-amber-600 text-[#0b1329] font-bold text-sm rounded-xl py-3.5 transition-all shadow-lg shadow-amber-500/20 cursor-pointer hover:scale-[1.01] active:scale-[0.99]">
                    Sign In
                </button>

                <p class="text-center text-sm text-slate-400 mt-4">
                    Belum punya akun? 
                    <button type="button" onclick="switchForm('register')" class="text-amber-500 font-semibold hover:underline cursor-pointer">Daftar Sekarang</button>
                </p>
            </form>

            <form id="registerForm" class="space-y-5 absolute w-full top-0 left-0 transition-all duration-500 transform translate-x-full opacity-0 pointer-events-none">
                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Create Username</label>
                    <input type="text" id="regUser" placeholder="Contoh: reihan_sticker" required
                        class="w-full bg-[#1e294b] text-white placeholder-slate-500 text-sm rounded-xl px-4 py-3 border border-slate-700 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all">
                </div>

                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2">Create Password</label>
                    <input type="password" id="regPass" placeholder="Masukkan password aman" required
                        class="w-full bg-[#1e294b] text-white placeholder-slate-500 text-sm rounded-xl px-4 py-3 border border-slate-700 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all">
                </div>

                <div id="regSuccess" class="text-green-400 text-xs font-medium hidden">
                    ✅ Akun berhasil dibuat! Mengalihkan ke Login...
                </div>

                <button type="submit" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-[#0b1329] font-bold text-sm rounded-xl py-3.5 transition-all shadow-lg shadow-emerald-500/20 cursor-pointer hover:scale-[1.01] active:scale-[0.99]">
                    Register Account ✓
                </button>

                <p class="text-center text-sm text-slate-400 mt-4">
                    Sudah punya akun? 
                    <button type="button" onclick="switchForm('login')" class="text-amber-500 font-semibold hover:underline cursor-pointer">Kembali ke Login</button>
                </p>
            </form>

        </div>

        <div class="text-center mt-6 border-t border-slate-800/50 pt-4">
            <p class="text-slate-500 text-xs">Proxie Stickers | Toko Sticker Online Berkualitas</p>
        </div>
    </div>

    <script>
        function switchForm(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const subtitle = document.getElementById('formSubtitle');

            if (type === 'register') {
                loginForm.classList.add('-translate-x-full', 'opacity-0', 'pointer-events-none');
                loginForm.classList.remove('translate-x-0', 'opacity-100', 'pointer-events-auto');
                
                registerForm.classList.add('translate-x-0', 'opacity-100', 'pointer-events-auto');
                registerForm.classList.remove('translate-x-full', 'opacity-0', 'pointer-events-none');
                
                subtitle.innerText = 'Buat akun barumu untuk mulai memesan stiker';
            } else {
                loginForm.classList.add('translate-x-0', 'opacity-100', 'pointer-events-auto');
                loginForm.classList.remove('-translate-x-full', 'opacity-0', 'pointer-events-none');
                
                registerForm.classList.add('translate-x-full', 'opacity-0', 'pointer-events-none');
                registerForm.classList.remove('translate-x-0', 'opacity-100', 'pointer-events-auto');
                
                subtitle.innerText = 'Sign in or register to explore our premium catalog';
            }
        }

        // PROSES REGISTER
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const usernameBaru = document.getElementById('regUser').value.trim();
            const passwordBaru = document.getElementById('regPass').value;
            const regSuccess = document.getElementById('regSuccess');

            localStorage.setItem(`user_${usernameBaru}`, passwordBaru);
            
            regSuccess.classList.remove('hidden');
            document.getElementById('regUser').value = '';
            document.getElementById('regPass').value = '';

            setTimeout(() => {
                regSuccess.classList.add('hidden');
                switchForm('login');
                document.getElementById('loginUser').value = usernameBaru;
            }, 1200);
        });

        // PROSES LOGIN
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const loginError = document.getElementById('loginError');

            const passwordTerdaftar = localStorage.getItem(`user_${user}`);

            if ((user === 'user123' && pass === 'user123') || (passwordTerdaftar && passwordTerdaftar === pass)) {
                loginError.classList.add('hidden');
                // 🟢 SEKARANG JALURNYA RELATIF (BIAR AMAN DI NETLIFY / VERCEL)
                window.location.href = '/temp.html';
            } else {
                loginError.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
